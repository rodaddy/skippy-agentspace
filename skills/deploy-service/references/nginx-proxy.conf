# {{SERVICE_NAME}} Service Proxy
# Template variables: {{SERVICE_NAME}}, {{DEPLOY_DOMAIN}}, {{BACKEND_IP}}, {{PORT}}
# Replace with sed before deploying. DEPLOY_DOMAIN comes from config.env.

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name {{SERVICE_NAME}}.{{DEPLOY_DOMAIN}};
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name {{SERVICE_NAME}}.{{DEPLOY_DOMAIN}};

    ssl_certificate /etc/letsencrypt/live/{{DEPLOY_DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DEPLOY_DOMAIN}}/privkey.pem;

    location / {
        proxy_pass http://{{BACKEND_IP}}:{{PORT}};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
