name: Tests & Evals
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  structural-evals:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run structural eval suite
        run: bash evals/structural/runner.sh

  bats-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install bun
        run: brew install oven-sh/bun/bun

      - name: Run bats tests
        run: ./tests/bats/bin/bats tests/
